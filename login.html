<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Tome</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="login.css">
</head>

<body>

<header>

<div class="topbar">

<h1 class="logo"><a href="shop.html">&#x1F4DA; Tome</a></h1>

<nav>
<a href="cart.html">Cart</a>
</nav>

<div id="authControls"></div>

</div>

</header>

<div class="container">

<h2>Customer Login</h2>

<form method="post" action="eshoplogin">

<label>Email</label><br>
<input type="email" name="email" required><br><br>

<label>Password</label><br>
<input type="password" name="password" required><br><br>

<button type="submit">Login</button>

</form>

</div>

<footer>

&copy; 2026 Tome

</footer>

<script src="auth.js"></script>
<script>
const params = new URLSearchParams(window.location.search);

if (params.get("register") === "success") {
  alert("Registration successful! Please login.");
}

if (params.get("required") === "1") {
  alert("Please login before adding items to cart.");
}

fetchSessionUser()
  .then(function (user) {
    setAuthControls(user);
  })
  .catch(function () {
    setAuthControls(null);
  });
</script>

</body>
</html>
